              ("krasnogorsk", "Красногорск", "в Красногорск", "в Красногорске"),
              ("odintsovo", "Одинцово", "в Одинцово", "в Одинцово"),
              ("balashiha", "Балашиха", "в Балашиха", "в Балашихе"),
              ("mytishchi", "Мытищи", "в Мытищи", "в Мытищах"),
              ("shchelkovo", "Щёлково", "в Щёлково", "в Щёлково"),
              ("lyubertsy", "Люберцы", "в Люберцы", "в Люберцах"),
              ("korolev", "Королёв", "в Королёв", "в Королёве"),
              ("podolsk", "Подольск", "в Подольск", "в Подольске"),
              ("elektrostal", "Электросталь", "в Электросталь", "в Электростали"),
              ("kolomna", "Коломна", "в Коломна", "в Коломне"),
              ("serpuhov", "Серпухов", "в Серпухов", "в Серпухове"),
              ("zhukovskiy", "Жуковский", "в Жуковский", "в Жуковском"),
              ("domodedovo", "Домодедово", "в Домодедово", "в Домодедово"),
              ("pushkino", "Пушкино", "в Пушкино", "в Пушкино"),
              ("sergiev-posad", "Сергиев Посад", "в Сергиев Посад", "в Сергиевом Посаде"),
              ("ramenskoe", "Раменское", "в Раменское", "в Раменском"),
              ("naro-fominsk", "Наро-Фоминск", "в Наро-Фоминск", "в Наро-Фоминске"),
              ("istra", "Истра", "в Истра", "в Истре"),
              ("dmitrov", "Дмитров", "в Дмитров", "в Дмитрове"),
              ("klin", "Клин", "в Клин", "в Клину"),
              ("solnechnogorsk", "Солнечногорск", "в Солнечногорск", "в Солнечногорске"),
