name: Generate New EStetColor Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate new category pages
        run: |
          python3 << 'PYEOF'
          import os

          DOMAIN = "seo.estetcolor.ru"
          PHONE = "+7 (926) 987-82-81"
          PHONE_CLEAN = "+79269878281"
          SITE_URL = "https://estetcolor.ru"

          CITIES = [
